services:
  postgres:
    image: postgres:16
    container_name: nba_predictor_postgres
    environment:
      POSTGRES_DB: nba_predictor
      POSTGRES_USER: nba
      POSTGRES_PASSWORD: nba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  api:
    build: .
    container_name: nba_predictor_api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: nba_predictor_dashboard
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres
      - api
    profiles:
      - dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: ["streamlit", "run", "src/nba_predictor/dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]

  daily-refresh:
    build: .
    container_name: nba_predictor_daily_refresh
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres
    profiles:
      - scheduler
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: ["python", "-m", "nba_predictor.jobs.refresh_pipeline", "--interval-hours", "24"]

  full-refresh:
    build: .
    container_name: nba_predictor_full_refresh
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres
    profiles:
      - scheduler
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: ["python", "-m", "nba_predictor.jobs.refresh_pipeline", "--interval-hours", "168", "--retrain"]

  superset-db:
    image: postgres:16
    container_name: nba_predictor_superset_db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    profiles:
      - analytics
    volumes:
      - superset_db_data:/var/lib/postgresql/data

  superset:
    image: apache/superset:latest-dev
    container_name: nba_predictor_superset
    environment:
      SUPERSET_SECRET_KEY: nba-forecasting-local-dev-secret
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      DATABASE_URL: postgresql+psycopg2://superset:superset@superset-db:5432/superset
    depends_on:
      - postgres
      - superset-db
    profiles:
      - analytics
    ports:
      - "8088:8088"
    volumes:
      - ./superset:/app/pythonpath
    command:
      - /bin/sh
      - -c
      - >
        superset db upgrade &&
        superset fab create-admin --username admin --firstname NBA --lastname Admin --email admin@example.com --password admin || true &&
        superset init &&
        /usr/bin/run-server.sh

volumes:
  postgres_data:
  superset_db_data:
